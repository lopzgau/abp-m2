<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar dinero</title>

    <!-- CSS BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- JS BOOTSTRAP -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- CSS PROPIO -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- JS PROPIO -->
    <script defer src="./assets/js/enviardinero.js"></script>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg bg-primary-subtle">
        <div class="container">
            <a class="navbar-brand" href="./index.html"> <i class="bi bi-wallet2"></i> Billetera Digital</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" aria-current="page" href="./index.html">Inicio</a>
                    <a class="nav-link" href="./menu.html">Menú Principal</a>
                    <a class="nav-link" href="./deposito.html">Depósito</a>
                    <a class="nav-link active" href="./enviardinero.html">Enviar dinero</a>
                    <a class="nav-link" href="./transaccion.html">Transacciones</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-5 container">
        <h1 class="text-center text-primary-emphasis text-capitalize">Enviar dinero</h1>
    </header>

    <main class="container">

        <section>
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                     <div class="card shadow text-center mb-4">
                        <div class="card-body">
                            <h2>Saldo disponible</h2>
                            <h2 class="text-success">
                                $<span id="balance">0</span>
                            </h2>
                        </div>
                    </div>
                    <form>
                        <div class="mb-3">
                            <label for="contacto" class="form-label">Buscar en la agenda de transferencias:</label>
                            <input type="text" class="form-control" name="contacto" id="contacto">
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary">Agregar nuevo contacto</button>
                        </div>

                        <div class="mb-3">
                            <h3>Contactos</h3>
                            <ul class="list-group" id="listaContactos">
                                <li class="list-group-item">
                                    <input class="form-check-input me-1" type="radio" name="contacto" value=""
                                        id="contacto1">
                                    <label class="form-check-label" for="contacto1">
                                        John Doe, CBU: 123456789, Alias: john.doe, Banco: ABC Bank
                                    </label>
                                </li>
                                <li class="list-group-item">
                                    <input class="form-check-input me-1" type="radio" name="contacto" value=""
                                        id="contacto2">
                                    <label class="form-check-label" for="contacto2">
                                        Jane Smith, CBU: 987654321, Alias: jane.smith, Banco: XYZ Bank
                                    </label>
                                </li>
                            </ul>
                        </div>
                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto:</label>
                            <input type="number" class="form-control" name="monto" id="monto" min="500">
                            <div id="montoHelp" class="form-text">El monto debe ser igual o superior a $1000.</div>
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary">Enviar dinero</button>
                        </div>

                    </form>

                </div>
            </div>

        </section>

    </main>

</body>

</html>
