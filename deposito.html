<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito</title>

    <!-- CSS BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- JS BOOTSTRAP -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- CSS PROPIO -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!--JS PROPIO-->
    <script defer src="./assets/js/deposit.js"></script>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg bg-primary-subtle">
        <div class="container">
            <a class="navbar-brand" href="./inicio.html"> <i class="bi bi-wallet2"></i> Billetera Digital</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" aria-current="page" href="./inicio.html">Inicio</a>
                    <a class="nav-link" href="./menu.html">Menú Principal</a>
                    <a class="nav-link active" href="./deposito.html">Depósito</a>
                    <a class="nav-link" href="./enviardinero.html">Enviar dinero</a>
                    <a class="nav-link" href="./transaccion.html">Transacciones</a>

                </div>
            </div>
        </div>
    </nav>

    <header class="py-5" container>
        <h2 class="text-center text-primary-emphasis">Deposita Tu Dinero Aquí:</h2>
    </header>

    <main class="container">

        <section>

            <div class="row justify-content-center">

                <div class="col-12 col-md-8 col-lg-6">
                    <div class="card shadow text-center mb-4">
                        <div class="card-body">
                            <h3>Saldo disponible</h3>
                            <h2 class="text-success">
                                $<span id="balance">0</span>
                            </h2>
                        </div>
                    </div>

                    <form id="formDeposito">
                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto a depositar:</label>
                            <input type="number" class="form-control" name="monto" id="monto"
                                placeholder="Ingresa el monto" required min="1000">
                            <div id="montoHelp" class="form-text">El monto debe ser igual o superior a $1000</div>
                        </div>
                        <div>
                            <input type="submit" value="Depositar" class="btn btn-primary">
                        </div>

                    </form>
                </div>

            </div>

        </section>

    </main>



</body>

</html>
